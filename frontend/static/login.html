<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - BestGames</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <header class="header">
        <!-- Аналогично главной странице -->
    </header>

    <main>
        <div class="container">
            <form class="form">
                <h1 style="text-align: center; margin-bottom: 30px;">Вход в личный кабинет</h1>
                
                <div class="form__group">
                    <label for="email" class="form__label">E-mail</label>
                    <input type="email" id="email" class="form__input" required>
                </div>

                <div class="form__group">
                    <label for="password" class="form__label">Пароль</label>
                    <input type="password" id="password" class="form__input" required>
                </div>

                <button type="submit" class="btn" style="width: 100%;">Войти</button>
                
                <p style="text-align: center; margin-top: 20px;">
                    <a href="#" style="color: var(--accent-primary);">Забыли пароль?</a>
                </p>
                
                <p style="text-align: center; margin-top: 20px;">
                    Нет аккаунта? <a href="register.html" style="color: var(--accent-primary);">Зарегистрироваться</a>
                </p>
            </form>
        </div>
    </main>

    <footer class="footer">
        <!-- Аналогично главной странице -->
    </footer>

    <script src="../js/theme.js"></script>
    <script src="../js/burger.js"></script>
</body>
</html>
