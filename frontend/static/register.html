<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация - BestGames</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <!-- Аналогично -->
    </header>

    <main>
        <div class="container">
            <form class="form">
                <h1 style="text-align: center; margin-bottom: 30px;">Регистрация</h1>

                <div class="form__group">
                    <label for="email" class="form__label">E-mail</label>
                    <input type="email" id="email" class="form__input" required>
                </div>

                <div class="form__group">
                    <label for="lastname" class="form__label">Фамилия</label>
                    <input type="text" id="lastname" class="form__input" required>
                </div>

                <div class="form__group">
                    <label for="firstname" class="form__label">Имя</label>
                    <input type="text" id="firstname" class="form__input" required>
                </div>

                <div class="form__group">
                    <label for="birthdate" class="form__label">Дата рождения</label>
                    <input type="date" id="birthdate" class="form__input" required>
                </div>

                <div class="form__group">
                    <label for="phone" class="form__label">Номер телефона</label>
                    <input type="tel" id="phone" class="form__input" required>
                </div>

                <div class="form__group">
                    <label for="password" class="form__label">Пароль</label>
                    <input type="password" id="password" class="form__input" required>
                </div>

                <div class="form__group">
                    <label for="password2" class="form__label">Повтор пароля</label>
                    <input type="password" id="password2" class="form__input" required>
                </div>

                <div class="form__group">
                    <label class="form__checkbox">
                        <input type="checkbox" required>
                        <span>Согласие на обработку персональных данных</span>
                    </label>
                </div>

                <button type="submit" class="btn" style="width: 100%;">Зарегистрироваться</button>
            </form>
        </div>
    </main>

    <footer class="footer">
        <!-- Аналогично -->
    </footer>

    <script src="js/theme.js"></script>
    <script src="js/burger.js"></script>
</body>
</html>
